<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Exam</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* BODY */
body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
     background:linear-gradient(135deg, #5f6676, #1e293b); 
    color:#e5e7eb;
}

/* CARD */
.card{
    width:100%;
    max-width:700px;
    /* background:#111827; */
    padding:30px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

/* TITLE */
h2{
    text-align:center;
    margin-bottom:22px;
    font-weight:600;
    font-size:24px;
}

/* LABEL */
label{
    font-size:15px;
    color:#ee0e0e;
    font-weight: bold;
}

/* INPUT */
input{
    width:100%;
    padding:11px;
    margin-top:6px;
    margin-bottom:16px;
    border-radius:10px;
    border:1px solid transparent;
    outline:none;
    background:#1f2937;
    color:#e5e7eb;
    transition:0.3s;
    font-size:14px;
}

input:focus{
    border-color:#3b82f6;
    background:#111827;
    box-shadow:0 0 0 3px rgba(59,130,246,0.2);
}

/* ROW */
.row{
    display:flex;
    gap:12px;
}

.row div{
    flex:1;
}

/* STUDENT BOX */

.student-box{
    margin-top:20px;
    background:#1f2937;
    border-radius:14px;
    padding:18px;
    border:1px solid #374151;
}

.student-title{
    font-size:16px;
    font-weight:600;
    margin-bottom:15px;
    color:#60a5fa;
}

/* SEARCH */

.search-box{
    margin-bottom:15px;
}

.search-box input{
    margin-bottom:0;
}

/* STUDENT LIST */

.student-list{
    max-height:250px;
    overflow-y:auto;
    padding-right:5px;
}

/* STUDENT ITEM */

.student-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#111827;
    padding:12px 14px;
    border-radius:10px;
    margin-bottom:10px;
    transition:0.3s;
}

.student-item:hover{
    background:#0f172a;
}

/* LEFT */

.student-left{
    display:flex;
    align-items:center;
    gap:12px;
}

/* AVATAR */

.avatar{
    width:38px;
    height:38px;
    border-radius:50%;
    background:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:white;
    font-size:14px;
}

/* NAME */

.student-name{
    font-size:14px;
    font-weight:500;
}

.student-id{
    font-size:12px;
    color:#9ca3af;
}

/* CHECKBOX */

.checkbox{
    width:22px;
    height:22px;
    accent-color:#2563eb;
    cursor:pointer;
}

/* BUTTON GROUP */

.btn-group{
    display:flex;
    gap:12px;
    margin-top:22px;
}

/* BUTTON */

.btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    transition:0.3s;
    text-align:center;
}

/* UPDATE */

.update{
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:white;
}

.update:hover{
    transform:translateY(-2px);
}

/* CANCEL */

.cancel{
    background:#374151;
    color:#e5e7eb;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
}

.cancel:hover{
    background:#4b5563;
}

/* RESPONSIVE */

@media(max-width:600px){

    .card{
        padding:22px;
    }

    h2{
        font-size:20px;
    }

}

@media(max-width:480px){

    body{
        align-items:flex-start;
    }

    .row{
        flex-direction:column;
    }

    .btn-group{
        flex-direction:column;
    }

    .btn{
        width:100%;
    }

}

</style>
</head>

<body>

<div class="card">

    <h2>✏️ Edit Exam</h2>

    <form method="POST">

        <!-- TITLE -->

        <label>Title</label>

        <input type="text"
        name="title"
        value="{{exam.title }}"
        required>

        <!-- START -->

        <label>Start Time</label>

        <input type="datetime-local"
        name="start_at"
        value="{{ exam.start_at.strftime('%Y-%m-%dT%H:%M') if exam.start_at else '' }}"
        required>

        <!-- END -->

        <label>End Time</label>

        <input type="datetime-local"
        name="end_at"
        value="{{ exam.end_at.strftime('%Y-%m-%dT%H:%M') if exam.end_at else '' }}"
        required>

        <!-- ROW -->

        <div class="row">

            <div>

                <label>Duration (min)</label>

                <input type="number"
                name="duration"
                value="{{ exam.duration_minutes }}"
                required>

            </div>

            <div>

                <label>Total Marks</label>

                <input type="number"
                name="total_marks"
                value="{{ exam.total_marks }}"
                required>

            </div>

        </div>

        <!-- PASS -->

        <label>Pass Marks</label>

        <input type="number"
        name="pass_marks"
        value="{{ exam.pass_marks }}"
        required>

        <!-- STUDENT SELECT -->

        <div class="student-box">

            <div class="student-title">
                👨‍🎓 Select Students For This Exam
            </div>

            <!-- SEARCH -->

            <div class="search-box">

                <input type="text"
                id="searchStudent"
                placeholder="Search student name...">

            </div>

            <!-- STUDENT LIST -->

            <div class="student-list"
            id="studentList">

                <!-- STUDENT -->

                {% for student in students %}

<div class="student-item">

    <div class="student-left">

        <div class="avatar">
            {{ student.name[0] }}
        </div>

        <div>

            <div class="student-name">
                {{ student.name }}
            </div>

            <div class="student-id">
                ID: {{ student.id }}
            </div>

        </div>

    </div>

    <!-- CHECKBOX -->

    <input type="checkbox"
    class="checkbox"
    name="selected_students"
    value="{{student.id }}"
    {% if student.id in assigned_students %}
    checked
    {% endif %}
    >

</div>

{% endfor %}

            </div>

        </div>

        <!-- BUTTON -->

        <div class="btn-group">

            <button type="submit"
            class="btn update">

                Publish Exam

            </button>

            <a href="/exam_list"
            class="btn cancel">

                Cancel

            </a>

        </div>

    </form>

</div>

<script>

/* SEARCH FILTER */

document
.getElementById("searchStudent")
.addEventListener("keyup", function(){

    let value = this.value.toLowerCase();

    let items = document.querySelectorAll(".student-item");

    items.forEach(function(item){

        let text = item.innerText.toLowerCase();

        item.style.display =
        text.includes(value)
        ? "flex"
        : "none";

    });

});

</script>

</body>
</html>
