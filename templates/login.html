<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow-x:hidden;

    padding:20px;

    background:
        linear-gradient(
            135deg,
            #0f172a,
            #1e293b,
            #312e81
        );

    position:relative;
}

/* BACKGROUND GLOW */

body::before{
    content:'';

    position:absolute;

    width:350px;
    height:350px;

    background:#7c3aed;

    border-radius:50%;

    filter:blur(120px);

    top:-120px;
    left:-120px;

    opacity:0.5;

    z-index:1;
}

body::after{
    content:'';

    position:absolute;

    width:350px;
    height:350px;

    background:#06b6d4;

    border-radius:50%;

    filter:blur(120px);

    bottom:-120px;
    right:-120px;

    opacity:0.4;

    z-index:1;
}

/* LOGIN CARD */

.login-container{

    width:100%;
    max-width:380px;

    padding:40px;

    border-radius:22px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.12);

    box-shadow:0 0 35px rgba(0,0,0,0.35);

    text-align:center;

    position:relative;

    z-index:10;
}

/* ICON */

.icon{

    width:85px;
    height:85px;

    margin:auto;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:38px;

    background:linear-gradient(
        135deg,
        #7c3aed,
        #06b6d4
    );

    margin-bottom:20px;

    box-shadow:0 0 25px rgba(124,58,237,0.5);
}

h1{
    color:white;
    font-size:30px;
    font-weight:600;
    margin-bottom:8px;
}

.subtitle{
    color:#cbd5e1;
    font-size:14px;
    margin-bottom:35px;
    line-height:1.6;
}

/* ERROR */

.error{
    background:rgba(239,68,68,0.15);
    color:#fecaca;

    padding:12px;

    border-radius:10px;

    margin-bottom:20px;

    font-size:14px;

    border:1px solid rgba(239,68,68,0.25);
}

/* INPUT */

.input-group{
    position:relative;
    margin-bottom:22px;
}

.input-group input{

    width:100%;

    padding:14px 14px 14px 50px;

    border:none;

    border-radius:12px;

    background:rgba(255,255,255,0.1);

    color:white;

    font-size:15px;

    outline:none;

    transition:0.3s;
}

.input-group input:focus{

    border:1px solid #38bdf8;

    box-shadow:0 0 12px rgba(56,189,248,0.5);
}

.input-group input::placeholder{
    color:#cbd5e1;
}

.input-group i{

    position:absolute;

    left:16px;

    top:50%;

    transform:translateY(-50%);

    font-size:18px;
}

/* OPTIONS */

.options{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:10px;

    margin-bottom:28px;

    font-size:13px;

    color:#e2e8f0;

    flex-wrap:wrap;
}

.options label{
    display:flex;
    align-items:center;
    gap:6px;
}

.options a{
    color:#93c5fd;
    text-decoration:none;
}

/* BUTTON */

.login-btn{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
        to right,
        #7c3aed,
        #06b6d4
    );

    color:white;

    font-size:16px;

    font-weight:600;

    letter-spacing:1px;

    cursor:pointer;

    transition:0.3s;
}

.login-btn:hover{

    transform:translateY(-2px);

    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* FOOTER */

.footer{

    margin-top:25px;

    font-size:12px;

    color:#cbd5e1;

    line-height:1.6;
}

/* ================= TABLET ================= */

@media(max-width:768px){

    .login-container{
        padding:35px 28px;
    }

    h1{
        font-size:26px;
    }

    .subtitle{
        font-size:13px;
    }

    .icon{
        width:75px;
        height:75px;
        font-size:34px;
    }
}

/* ================= MOBILE ================= */

@media(max-width:480px){

    body{
        padding:15px;
    }

    .login-container{

        padding:28px 20px;

        border-radius:18px;
    }

    h1{
        font-size:24px;
    }

    .subtitle{
        font-size:12px;
        margin-bottom:28px;
    }

    .icon{
        width:68px;
        height:68px;
        font-size:30px;

        margin-bottom:16px;
    }

    .input-group{
        margin-bottom:18px;
    }

    .input-group input{

        padding:13px 13px 13px 45px;

        font-size:14px;
    }

    .input-group i{
        left:14px;
        font-size:16px;
    }

    .options{
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
    }

    .login-btn{
        padding:13px;
        font-size:15px;
    }

    .footer{
        font-size:11px;
    }
}

/* ================= SMALL MOBILE ================= */

@media(max-width:360px){

    .login-container{
        padding:24px 16px;
    }

    h1{
        font-size:22px;
    }

    .logo{
        font-size:14px;
    }

    .login-btn{
        font-size:14px;
    }
}

</style>
</head>

<body>

<div class="login-container">

<form action="{{ url_for('login') }}" method="POST">

    <div class="icon">🛡️</div>

    <h1>Admin Login</h1>

    <div class="subtitle">
        Secure Examination Management System
    </div>

    <!-- ERROR MESSAGE -->
    {% if error %}
    <div class="error">
        ❌ Invalid Mobile Number or Password
    </div>
    {% endif %}

    <!-- PHONE -->
    <div class="input-group">

        <i>📱</i>

        <input
            type="tel"
            name="phone"
            placeholder="Admin Mobile Number"
            required
        >

    </div>

    <!-- PASSWORD -->
    <div class="input-group">

        <i>🔒</i>

        <input
            type="password"
            name="password"
            placeholder="Admin Password"
            required
        >

    </div>

    <!-- OPTIONS -->
    <div class="options">

        <label>
            <input type="checkbox" name="remember">
            Remember Me
        </label>

        <a href="#">
            Forgot Password?
        </a>

    </div>

    <!-- LOGIN BUTTON -->
    <button type="submit" class="login-btn">

        LOGIN AS ADMIN

    </button>

</form>

<div class="footer">
    © 2026 Online Exam System
</div>

</div>

</body>
</html>
