<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* ================= BODY ================= */

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:25px;

    background:
    url('https://www.chattblog.com/_next/static/media/aiHuman.c3edd1b2.jpeg')
    no-repeat center center/cover;

    position:relative;

    overflow-x:hidden;
}

/* ================= BLUR OVERLAY ================= */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.55);

    backdrop-filter:blur(6px);

    -webkit-backdrop-filter:blur(6px);

    z-index:-1;
}

/* ================= BACK BUTTON ================= */

.back-btn{

    position:absolute;

    top:25px;

    left:25px;

    padding:11px 22px;

    border-radius:30px;

    background:rgba(255,255,255,0.15);

    color:white;

    text-decoration:none;

    font-size:14px;

    font-weight:600;

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:0 8px 20px rgba(0,0,0,0.25);

    transition:0.3s;

    z-index:100;
}

.back-btn:hover{

    background:#6d5dfc;

    transform:translateY(-2px);
}

/* ================= MAIN CONTAINER ================= */

.container{

    width:100%;

    max-width:900px;

    min-height:500px;

    display:flex;

    background:rgba(255,255,255,0.95);

    border-radius:24px;

    overflow:hidden;

    box-shadow:0 25px 50px rgba(0,0,0,0.35);
}

/* ================= LEFT SECTION ================= */

.left{

    flex:1;

    background:linear-gradient(
        135deg,
        #7c6ff4,
        #5a4fcf
    );

    color:white;

    padding:50px;

    display:flex;

    flex-direction:column;

    justify-content:center;
}

.left h1{

    font-size:42px;

    margin-bottom:15px;

    line-height:1.3;
}

.left p{

    font-size:16px;

    line-height:1.8;

    opacity:0.95;
}

/* ================= RIGHT SECTION ================= */

.right{

    flex:1;

    padding:50px;

    display:flex;

    flex-direction:column;

    justify-content:center;
}

.right h2{

    margin-bottom:25px;

    color:#1e293b;

    font-size:34px;

    font-weight:700;
}

/* ================= INPUT ================= */

input{

    width:100%;

    padding:14px 18px;

    margin:12px 0;

    border-radius:30px;

    border:1px solid #d1d5db;

    outline:none;

    font-size:15px;

    transition:0.3s;

    background:#f8fafc;
}

input:focus{

    border-color:#6d5dfc;

    box-shadow:0 0 10px rgba(109,93,252,0.25);
}

/* ================= BUTTON ================= */

button{

    width:100%;

    padding:14px;

    margin-top:18px;

    border:none;

    border-radius:30px;

    background:linear-gradient(
        135deg,
        #6d5dfc,
        #5a4fcf
    );

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;

    box-shadow:0 10px 20px rgba(90,79,207,0.25);
}

button:hover{

    transform:translateY(-2px);

    opacity:0.95;
}

/* ================= FOOTER ================= */

.footer{

    margin-top:18px;

    font-size:13px;

    text-align:center;

    color:#64748b;
}

/* ================= TABLET ================= */

@media(max-width:900px){

    .container{

        max-width:700px;

        min-height:auto;
    }

    .left,
    .right{

        padding:40px;
    }

    .left h1{

        font-size:34px;
    }

    .right h2{

        font-size:30px;
    }
}

/* ================= MOBILE ================= */

@media(max-width:768px){

    body{

        padding:90px 18px 20px;
    }

    .container{

        flex-direction:column;

        border-radius:20px;
    }

    .left{

        padding:35px 28px;

        text-align:center;
    }

    .right{

        padding:35px 28px;
    }

    .left h1{

        font-size:30px;
    }

    .left p{

        font-size:14px;
    }

    .right h2{

        font-size:28px;

        text-align:center;
    }

    .back-btn{

        top:18px;

        left:18px;

        font-size:13px;

        padding:10px 18px;
    }
}

/* ================= SMALL MOBILE ================= */

@media(max-width:480px){

    body{

        padding:85px 14px 14px;
    }

    .container{

        border-radius:18px;
    }

    .left,
    .right{

        padding:28px 20px;
    }

    .left h1{

        font-size:25px;
    }

    .right h2{

        font-size:24px;
    }

    input{

        padding:13px 16px;

        font-size:14px;
    }

    button{

        padding:13px;

        font-size:15px;
    }

    .footer{

        font-size:12px;
    }

    .back-btn{

        font-size:12px;

        padding:9px 16px;
    }
}

</style>

</head>

<body>

<!-- BACK BUTTON -->

<a href="{{ url_for('home') }}" class="back-btn">

    ← Back

</a>

<!-- MAIN CONTAINER -->

<div class="container">

    <!-- LEFT SECTION -->

    <div class="left">

        <h1>Welcome Back!</h1>

        <p>
            You can sign in to access your existing account and continue your online examination journey.
        </p>

    </div>

    <!-- RIGHT SECTION -->

    <div class="right">

        <h2>Sign In</h2>

        <form
            method="POST"
            action="{{ url_for('exam.student_login') }}"
        >

            <input
                type="text"
                name="name"
                placeholder="Enter Name"
                required
            >

            <input
                type="text"
                name="student_id"
                placeholder="Student ID"
                required
            >

            <button type="submit">

                Login

            </button>

        </form>

        <div class="footer">

            Student Portal

        </div>

    </div>

</div>

</body>
</html>
