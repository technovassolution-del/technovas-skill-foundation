<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Technovas Dashboard</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* BODY */
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url('https://thumbs.dreamstime.com/b/ai-machine-learning-hands-robot-human-touching-big-data-network-connection-background-science-artificial-intelligence-172987598.jpg')
    no-repeat center center/cover;
    color:#fff;
    position:relative;
    padding:20px;
}

/* OVERLAY */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(5px);
    z-index:-1;
}

/* CONTAINER */
.container{
    width:100%;
    max-width:1100px;
    text-align:center;
}

/* HEADER */
.header{
    margin-bottom:30px;
}

.header h1{
    font-size:32px;
    margin-bottom:8px;
    line-height:1.3;
}

.header p{
    color:#d1d5db;
    font-size:14px;
}

/* GRID */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:15px;
    padding:25px;
    transition:0.3s;
    cursor:pointer;
    text-decoration:none;
    color:#fff;
    display:block;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* HOVER */
.card:hover{
    transform:translateY(-8px) scale(1.03);
    background:linear-gradient(135deg,#22c55e,#06b6d4);
    color:#000;
}

/* TEXT */
.card h3{
    margin-bottom:10px;
    font-size:18px;
}

.card p{
    font-size:13px;
}

/* RESPONSIVE */

/* TABLET */
@media(max-width:768px){

    .header h1{
        font-size:26px;
    }

    .header p{
        font-size:13px;
    }

    .cards{
        grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
        gap:15px;
    }

    .card{
        padding:20px;
    }

}

/* MOBILE */
@media(max-width:480px){

    body{
        align-items:flex-start;
    }

    .header h1{
        font-size:22px;
    }

    .cards{
        grid-template-columns:1fr;
    }

    .card{
        padding:18px;
    }

}

/* VERY SMALL */
@media(max-width:360px){

    .header h1{
        font-size:20px;
    }

    .card h3{
        font-size:16px;
    }

    .card p{
        font-size:12px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Technovas Solution Dashboard</h1>
        <p>Manage your complete exam system easily</p>
    </div>

    <div class="cards">

        <a href="{{ url_for('exam.create_exam_page')}}" class="card">
            <h3>Exam Create</h3>
            <p>Create and manage exams</p>
        </a>

        <a href="{{ url_for('user.user_creation') }}" class="card">
            <h3>User Registration</h3>
            <p>Create and manage your identity</p>
        </a>

        <a href="{{url_for('question.add_question')}}" class="card">
            <h3>Question Bank</h3>
            <p>Store and manage questions</p>
        </a>

        <a href="{{ url_for('exam.exam_list') }}" class="card">
            <h3>Exam List</h3>
            <p>Show & manage all exam list</p>
        </a>

        <a href="{{ url_for('exam.result_processing') }}" class="card">
            <h3>Result Processing</h3>
            <p>Calculate and publish results</p>
        </a>

    </div>

</div>

</body>
</html>
