<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Question</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f1f5f9;
    padding:20px;
}

/* MAIN WRAPPER */
.container{
    width:100%;
    max-width:1200px;
    margin:auto;
}

/* FLEX LAYOUT */
.row{
    display:flex;
    gap:20px;
    align-items:flex-start;
}

/* BOX */
.box{
    flex:1;
    background:#ffffff;
    padding:25px;
    border-radius:16px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
    width:100%;
}

/* HEADINGS */
h3{
    margin-bottom:20px;
    color:#0f172a;
    font-size:24px;
    font-weight:600;
}

/* LABEL */
label{
    display:block;
    margin-bottom:8px;
    color:#334155;
    font-size:14px;
    font-weight:500;
}

/* INPUT */
input,
textarea,
select{
    width:100%;
    padding:12px 14px;
    margin-bottom:15px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    outline:none;
    font-size:15px;
    transition:0.3s;
    background:#fff;
}

input:focus,
textarea:focus,
select:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

/* TEXTAREA */
textarea{
    min-height:120px;
    resize:vertical;
}

/* OPTION */
.option{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:15px;
    background:#f8fafc;
    padding:12px;
    border-radius:12px;
    border:1px solid #e2e8f0;
}

.option input[type="text"]{
    margin-bottom:0;
    flex:1;
}

.option input[type="radio"]{
    width:auto;
    margin:0;
    transform:scale(1.2);
    cursor:pointer;
}

.option label{
    margin:0;
    white-space:nowrap;
    cursor:pointer;
}

/* BUTTON */
button{
    width:100%;
    padding:15px;
    margin-top:25px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    transition:0.3s;
    box-shadow:0 4px 15px rgba(37,99,235,0.25);
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

/* TABLET */
@media(max-width:992px){

    .row{
        flex-direction:column;
    }

    .box{
        width:100%;
    }

}

/* MOBILE */
@media(max-width:600px){

    body{
        padding:15px;
    }

    .box{
        padding:18px;
        border-radius:14px;
    }

    h3{
        font-size:20px;
    }

    input,
    textarea,
    select{
        font-size:14px;
        padding:11px 12px;
    }

    .option{
        flex-direction:column;
        align-items:flex-start;
    }

    .option input[type="text"]{
        width:100%;
    }

    button{
        font-size:15px;
        padding:14px;
    }

}

/* EXTRA SMALL MOBILE */
@media(max-width:400px){

    h3{
        font-size:18px;
    }

    .box{
        padding:15px;
    }

    input,
    textarea,
    select{
        font-size:13px;
    }

}

</style>
</head>

<body>

<div class="container">

<form method="POST" action="{{ url_for('question.save_question') }}">

<div class="row">

<!-- LEFT BOX -->
<div class="box">

<h3>Question</h3>

<label>Select Exam</label>

<select name="exam_id" required>
    <option value="">-- Select Exam --</option>

    {% for exam in exams %}
        <option value="{{ exam.id }}">{{ exam.title }}</option>
    {% endfor %}

</select>

<textarea name="question_text" placeholder="Enter Question" required></textarea>

<select name="question_type">
    <option value="MCQ_SINGLE">MCQ Single</option>
</select>

<select name="difficulty">
    <option value="EASY">EASY</option>
    <option value="MEDIUM">MEDIUM</option>
    <option value="HARD">HARD</option>
</select>

<input type="text" name="topic" placeholder="Topic">

<textarea name="explanation" placeholder="Explanation"></textarea>

<input type="number" name="marks" value="1" placeholder="Marks">

<input type="number" name="negative_marks" value="0" placeholder="Negative Marks">

</div>

<!-- RIGHT BOX -->
<div class="box">

<h3>Options</h3>

<div class="option">
    <input type="text" name="option1" placeholder="Option 1" required>

    <input type="radio" id="correct1" name="correct" value="1" required>

    <label for="correct1">Correct</label>
</div>

<div class="option">
    <input type="text" name="option2" placeholder="Option 2" required>

    <input type="radio" id="correct2" name="correct" value="2">

    <label for="correct2">Correct</label>
</div>

<div class="option">
    <input type="text" name="option3" placeholder="Option 3" required>

    <input type="radio" id="correct3" name="correct" value="3">

    <label for="correct3">Correct</label>
</div>

<div class="option">
    <input type="text" name="option4" placeholder="Option 4" required>

    <input type="radio" id="correct4" name="correct" value="4">

    <label for="correct4">Correct</label>
</div>

</div>

</div>

<!-- BUTTON -->
<button type="submit">Save Question</button>

</form>

</div>

</body>
</html>
