<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>All Users</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#6ee7b7,#9333ea);
    min-height:100vh;
    padding:20px;
}

/* MAIN CONTAINER */
.container{
    width:100%;
    max-width:1200px;
    margin:auto;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.header h2{
    color:white;
    font-size:32px;
    font-weight:600;
    word-break:break-word;
}

/* REMOVE LINK UNDERLINE */
a{
    text-decoration:none;
}

/* BUTTON GROUP */
.header-buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

/* BUTTON */
.btn{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    color:white;
    font-size:14px;
    font-weight:500;
    transition:0.3s;
    min-height:45px;
}

.btn-dark{
    background:#111827;
}

.btn-dark:hover{
    background:#000;
    transform:translateY(-2px);
}

.btn-delete{
    background:#ef4444;
}

.btn-delete:hover{
    background:#dc2626;
    transform:translateY(-2px);
}

/* CARD */
.card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    overflow:hidden;
}

/* TABLE WRAPPER */
.table-wrapper{
    width:100%;
    overflow-x:auto;
    border-radius:14px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    min-width:750px;
}

/* HEADER */
th{
    background:rgba(0,0,0,0.45);
    color:white;
    padding:16px;
    text-align:center;
    font-size:15px;
    font-weight:600;
}

/* TABLE DATA */
td{
    padding:15px;
    text-align:center;
    color:white;
    font-size:14px;
    border-bottom:1px solid rgba(255,255,255,0.08);
    word-break:break-word;
}

/* ROW */
tr:nth-child(even){
    background:rgba(255,255,255,0.05);
}

tr:hover{
    background:rgba(255,255,255,0.15);
    transition:0.3s;
}

/* MOBILE RESPONSIVE */
@media(max-width:768px){

    body{
        padding:15px;
    }

    .header{
        flex-direction:column;
        align-items:flex-start;
    }

    .header h2{
        font-size:24px;
    }

    .header-buttons{
        width:100%;
    }

    .header-buttons a{
        flex:1;
    }

    .btn{
        width:100%;
    }

    .card{
        padding:15px;
        border-radius:16px;
    }

    table,
    thead,
    tbody,
    th,
    td,
    tr{
        display:block;
        width:100%;
    }

    table{
        min-width:100%;
    }

    thead{
        display:none;
    }

    tr{
        margin-bottom:18px;
        background:rgba(0,0,0,0.25);
        border-radius:14px;
        padding:15px;
        overflow:hidden;
    }

    td{
        text-align:left;
        padding:12px 10px;
        position:relative;
        border:none;
        border-bottom:1px solid rgba(255,255,255,0.08);
    }

    td:last-child{
        border-bottom:none;
    }

    td::before{
        content:attr(data-label);
        display:block;
        font-size:13px;
        font-weight:600;
        color:#d1d5db;
        margin-bottom:6px;
    }

    td .btn{
        margin-top:8px;
        width:100%;
    }

}

/* EXTRA SMALL DEVICES */
@media(max-width:480px){

    .header h2{
        font-size:20px;
        line-height:1.4;
    }

    .btn{
        font-size:13px;
        padding:11px 14px;
    }

    td{
        font-size:13px;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <h2>👥 All Registered Users</h2>

        <div class="header-buttons">

            <!-- HOME -->
            <a href="/">
                <button class="btn btn-dark">
                    🏠 Home
                </button>
            </a>

            <!-- BACK -->
            <a href="/register">
                <button class="btn btn-dark">
                    ⬅ Back
                </button>
            </a>

        </div>

    </div>

    <!-- CARD -->
    <div class="card">

        <div class="table-wrapper">

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Mobile</th>
                        <th>Role</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>

                {% for user in users %}

                <tr>

                    <td data-label="ID">
                        {{ user.id }}
                    </td>

                    <td data-label="Name">
                        {{ user.full_name }}
                    </td>

                    <td data-label="Email">
                        {{ user.email }}
                    </td>

                    <td data-label="Mobile">
                        {{ user.mobile }}
                    </td>

                    <td data-label="Role">
                        {{ user.role }}
                    </td>

                    <td data-label="Action">

                        <a href="/delete_user/{{ user.id }}"
                           onclick="return confirm('Are you sure you want to delete this user?');">

                            <button class="btn btn-delete">
                                🗑 Delete
                            </button>

                        </a>

                    </td>

                </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
