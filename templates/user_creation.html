
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register User</title>


<style>
    
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    /* background: linear-gradient(135deg,#1e293b,#0f172a); */
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.wrapper{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:#ffffff;
    padding:35px;
    width:380px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,0.4);
    animation:fadeIn 0.6s ease-in-out;
}

h2{
    text-align:center;
    color:#1e293b;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    font-size:14px;
    color:#64748b;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

label{
    font-weight:600;
    font-size:14px;
    margin-bottom:5px;
    display:block;
}

input, select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    outline:none;
    transition:0.3s;
}

input:focus, select:focus{
    border-color:#2563eb;
    box-shadow:0 0 5px rgba(37,99,235,0.3);
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    border:none;
    border-radius:10px;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

.alert{
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    font-size:14px;
    text-align:center;
}

.success{
    background:#d1fae5;
    color:#065f46;
}

.danger{
    background:#fee2e2;
    color:#991b1b;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
} 
</style>
</head>

<body>

<div class="wrapper">

    <div class="card">
        <a href="{{ url_for('user.all_users') }}">
    <button style="margin-bottom:15px; background:#2563eb; color:white;">
        👥 Show All Users
    </button>
</a>
        <h2>Create Account</h2>
        <p class="subtitle">Register a new user</p>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert {{category}}">{{message}}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST">

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="full_name" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" required>
            </div>

            <div class="input-group">
                <label>Mobile Number</label>
                <input type="text" name="mobile">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <div class="input-group">
                <label>User Role</label>
                <select name="role">
                    <option value="STUDENT">Student</option>
                    <option value="ADMIN">Admin</option>
                    <option value="EVALUATOR">Evaluator</option>
                </select>
            </div>

            <button type="submit">Register</button>

        </form>
    </div>

</div>

</body>
</html>
