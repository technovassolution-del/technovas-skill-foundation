<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Details</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:#1f2937;
    color:white;
    padding:40px 15px;
    display:flex;
    justify-content:center;
    align-items:flex-start; /* FIXED */
}

/* WRAPPER */
.wrapper{
    width:100%;
    max-width:450px;
}

/* TOP BAR (FIXED instead of absolute) */
.top-bar{
    display:flex;
    justify-content:flex-end;
    margin-bottom:15px;
}

.top-btn{
    background:rgba(255,255,255,0.12);
    padding:8px 14px;
    border-radius:25px;
    color:white;
    text-decoration:none;
    font-size:13px;
    backdrop-filter:blur(10px);
    white-space:nowrap;
}

/* MAIN BOX */
.box{
    background:#2f3b4f;
    padding:30px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    width:100%;
}

/* TEXT */
h2{
    font-size:22px;
    margin-bottom:12px;
}

p{
    margin:6px 0;
    font-size:14px;
    color:#e5e7eb;
}

/* BUTTON GROUP */
.btn-group{
    margin-top:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.btn-group a{
    display:block;
    width:100%;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
}

.start{
    background:#10b981;
    color:white;
}

.back{
    background:#6b7280;
    color:white;
}

/* MOBILE FIX */
@media(max-width:480px){

    body{
        padding:20px 10px;
    }

    .box{
        padding:20px;
    }

    h2{
        font-size:20px;
    }
}

</style>
</head>

<body>

<div class="wrapper">

    <!-- FIXED TOP BUTTON -->
    <div class="top-bar">
        <a href="#" class="top-btn">🏠 Go To Dashboard</a>
    </div>

    <div class="box">

        <h2>Welcome {{name}}</h2>

        <p><b>Course:</b> {{course}}</p>
        <p><b>Exam Time:</b> {{time}} Minutes</p>

        <div class="btn-group">

            <a href="/exam">
                <button class="start">Start Exam</button>
            </a>

            <a href="/">
                <button class="back">Back</button>
            </a>

        </div>

    </div>

</div>

</body>
</html>
