<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Registration Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
        overflow-x: hidden;
        font-family: 'Segoe UI', sans-serif;
    }

    /* Sidebar */
    .sidebar {
        height: 100vh;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(15px);
        padding: 20px;
        color: white;
    }

    .sidebar a {
        display: block;
        color: white;
        text-decoration: none;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 10px;
        transition: 0.3s;
    }

    .sidebar a:hover {
        background: rgba(255,255,255,0.2);
    }

    /* Glass Card */
    .glass-card {
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        padding: 30px;
        color: white;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .profile-preview {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid rgba(255,255,255,0.6);
    }

    input, .form-control {
        background: rgba(255,255,255,0.2) !important;
        border: none !important;
        color: white !important;
    }

    input::placeholder {
        color: rgba(255,255,255,0.7);
    }

    .btn-custom {
        background: white;
        color: #333;
        font-weight: 600;
        border-radius: 10px;
    }

    .navbar {
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
    }
</style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4>Admin Panel</h4>
            <a href="#">Dashboard</a>
            <a href="register">Face Registration</a>
            <a href="#">Users</a>
            <a href="/report">Reports</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10">

            <!-- Navbar -->
            <nav class="navbar p-3 mb-4">
                <span class="text-white fs-5">Face Recognition System</span>
            </nav>

            <!-- Form -->
            <div class="row justify-content-center">
                <div class="col-md-12">

                    <div class="glass-card">
<h2>Attendance Report</h2>

<table border="5" class="table table-striped">
<tr>
    <th>ID</th>
    <th>User ID</th>
    <th>Name</th>
    <th>Date</th>
    <th>In Time</th>
    <th>Out Time</th>
</tr>

{% for row in data %}
<tr>
    <td>{{row[0]}}</td>
    <td>{{row[1]}}</td>
    <td>{{row[2]}}</td>
    <td>{{row[3]}}</td>
    <td>{{row[4]}}</td>
    <td>{{row[5]}}</td>
</tr>
{% endfor %}
</table>


                        
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>



</body>
</html>
